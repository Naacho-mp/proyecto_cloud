name: build and push para AWS ECR - ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Codigo
        uses: actions/checkout@v4

      - name: Configurar AWS Credenciales
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login en AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Instalar jq (para manipular JSON)
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------------------- BUILD & PUSH --------------------
 
      - name: Build y push Backend - FastAPI  
        run: |
          docker build -t back-cloud ./back-cloud/servicio2
          docker tag back-cloud:latest 108631844678.dkr.ecr.sa-east-1.amazonaws.com/back-cloud:latest
          docker push 108631844678.dkr.ecr.sa-east-1.amazonaws.com/back-cloud:latest

      #-------------------MERCADO PAGO-------------
      - name: Build y push Api Pagos - Mercado Pagos
        run: |
          docker build -t api-pagos ./apijava
          docker tag api-pagos:latest 108631844678.dkr.ecr.sa-east-1.amazonaws.com/api-pagos:latest
          docker push 108631844678.dkr.ecr.sa-east-1.amazonaws.com/api-pagos:latest

