version: '3.8'

services:
  # Backend FastAPI
  td-backend:
    build:
      context: ./back-cloud/servicio2
    container_name: servicio_fastapi
    expose:
      - "8000"
    env_file:
      - ./back-cloud/servicio2/.env
    environment:
      - DB_SERVER=base-datos-cloud.ck36gi48sk0r.us-east-1.rds.amazonaws.com
      - DB_USERNAME=admin
      - DB_PASSWORD=admin1234
      - DB_DATABASE=tienda
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Servicio Java Webpay
  td-java:
    build:
      context: ./apijava
      dockerfile: Dockerfile
    container_name: servicio_webpay_java
    expose:
      - "8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - microservices-network
    depends_on:
      td-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/java/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend React (Solo Nginx sirviendo archivos estáticos)
  # NO hace proxy, el ALB maneja el routing en producción
  td-frontend:
    build:
      context: ./front-cloud/mi-tienda
      dockerfile: Dockerfile
    container_name: tienda_frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - microservices-network
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WEBPAY_URL=http://localhost:8080/java
    depends_on:
      - td-backend
      - td-java

networks:
  microservices-network:
    driver: bridge
