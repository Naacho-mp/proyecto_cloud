server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Backend Java
    location /java/ {
        proxy_pass http://balanceador-carga-1567813537.us-east-1.elb.amazonaws.com/java/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API FastAPI
    location /api/ {
        proxy_pass http://balanceador-carga-1567813537.us-east-1.elb.amazonaws.com/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend React
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
